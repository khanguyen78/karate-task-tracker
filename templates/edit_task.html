<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Edit Task</h1>
        </div>

        <div class="card">
            <form id="editForm" class="edit-task-form">
                <div class="form-group">
                    <label for="title">Task Title *</label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        value="{{ task.title }}"
                        required 
                        class="form-input"
                        minlength="2"
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea 
                        id="description" 
                        name="description" 
                        class="form-textarea"
                        rows="3"
                    >{{ task.description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="estimated_time">Estimated Time (seconds) *</label>
                    <input 
                        type="number" 
                        id="estimated_time" 
                        name="estimated_time" 
                        value="{{ task.estimated_time }}"
                        required 
                        class="form-input"
                        min="1"
                        max="99999"
                    >
                </div>

                <div class="form-group">
                    <label for="difficulty">Difficulty</label>
                    <select id="difficulty" name="difficulty" class="form-input">
                        <option value="easy"   {% if task.difficulty == 'easy'   %}selected{% endif %}>🟢 Easy</option>
                        <option value="medium" {% if task.difficulty == 'medium' %}selected{% endif %}>🟡 Medium</option>
                        <option value="hard"   {% if task.difficulty == 'hard'   %}selected{% endif %}>🟠 Hard</option>
                        <option value="expert" {% if task.difficulty == 'expert' %}selected{% endif %}>🔴 Expert</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary btn-large">
                        💾 Save Changes
                    </button>
                    <button type="button" onclick="deleteTask()" class="btn btn-warning">
                        🗑️ Delete Task
                    </button>
                    <button type="button" onclick="goBack()" class="btn btn-secondary">
                        ← Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const taskId = {{ task.id }};

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            
            try {
                const response = await fetch('/task/' + taskId + '/update', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('✅ Task updated successfully!');
                    goBack();
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.detail || 'Failed to update task'));
                }
            } catch (error) {
                alert('Error updating task: ' + error.message);
            }
        });

        async function deleteTask() {
            if (!confirm('⚠️ Delete this task?\n\nThis will remove it from the available tasks list. Past completions will remain in history.')) {
                return;
            }

            if (!confirm('Are you sure? This cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch('/task/' + taskId, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const data = await response.json();
                    alert('✅ ' + data.message);
                    goBack();
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.detail || 'Failed to delete task'));
                }
            } catch (error) {
                alert('Error deleting task: ' + error.message);
            }
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
