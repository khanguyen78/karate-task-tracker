version: '3.8'

services:
  karate-tracker:
    build: .
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      - ./templates:/app/templates
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/karate_tracker.db
    restart: unless-stopped
